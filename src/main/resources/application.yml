spring:
  application:
    name: marcapro-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marcapro}
    username: ${DB_USER:marcapro}
    password: ${DB_PASS:marcapro}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:marcapro-super-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000  # 24 horas

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
